# Ghostlink Main Configuration
# Populated automatically by the install script

[system]
hostname=ghostlink
timezone=UTC

[zram]
enabled=true
size_mb=1024
compression=zstd

[fan]
mode=medium-high
temp_off=50
temp_low=60
temp_mid=70
temp_high=80

[ssd]
scheduler=none
noatime=true
readahead_kb=8192
fstrim_schedule=weekly

[network]
mgmt_interface=gl-mgmt
upstream_interface=gl-upstream
hotspot_interface=gl-hotspot

[mgmt]
# mode: 'existing' (connect to your network) or 'custom' (use predefined SSID)
mode=existing
ssid=
password=

[hotspot]
ssid=GhostNet
password=changeme
channel=6
band=2.4GHz
hidden=false

[identity]
auto_rotate=false
rotate_interval_hours=24
default_profile=random
persist_across_reboot=true

[dashboard]
port=8080
https=true
bind_interface=gl-mgmt

[llm]
# provider: claude | openai | groq | ollama
provider=claude
api_key=
model=claude-sonnet-4-6
# ollama_host=http://localhost:11434  (only for ollama)
enabled=false

[pentest]
monitor_interface=gl-upstream
log_dir=/var/log/ghostlink
report_dir=/var/log/ghostlink/reports
wordlist=/opt/ghostlink/wordlists/rockyou.txt
