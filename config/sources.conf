# Ghostlink External Sources
# Single source of truth for all upstream URLs, branches, and versions.
# The install script reads this file — nothing is hardcoded in scripts.

# ─── KERNEL BUILD DEPENDENCIES (apt) ────────────────────────────────────────

APT_BUILD_DEPS="linux-headers-$(uname -r) build-essential dkms git curl wget"

# ─── DRIVERS (git + dkms) ───────────────────────────────────────────────────
# Format: DRIVER_<NAME>_URL, DRIVER_<NAME>_BRANCH, DRIVER_<NAME>_USB_IDS

DRIVER_RTL8812AU_URL="https://github.com/aircrack-ng/rtl8812au"
DRIVER_RTL8812AU_BRANCH="v5.6.4.2"
DRIVER_RTL8812AU_USB_IDS="0bda:8812 0bda:881a 0bda:8811 2357:0101 2357:0103 0bda:a811"

DRIVER_RTL88X2BU_URL="https://github.com/morrownr/88x2bu-20210702"
DRIVER_RTL88X2BU_BRANCH="main"
DRIVER_RTL88X2BU_USB_IDS="0bda:b812 0bda:b820 0bda:b82c 2001:331e 0bda:c820"

DRIVER_RTL8188EUS_URL="https://github.com/aircrack-ng/rtl8188eus"
DRIVER_RTL8188EUS_BRANCH="v5.3.9"
DRIVER_RTL8188EUS_USB_IDS="0bda:8179 0bda:8178 0bda:817e 2001:3311 0bda:0179"

# ─── PENTEST TOOLS (apt) ─────────────────────────────────────────────────────

APT_PENTEST_TOOLS="aircrack-ng hcxtools hcxdumptool hashcat reaver macchanger tcpdump net-tools iw wireless-tools hostapd dnsmasq iptables iptables-persistent"

# ─── PENTEST TOOLS (git) ────────────────────────────────────────────────────

TOOL_WIFITE2_URL="https://github.com/kimocoder/wifite2"
TOOL_WIFITE2_BRANCH="master"
TOOL_WIFITE2_INSTALL="pip install -e ."
TOOL_WIFITE2_DEST="/opt/ghostlink/tools/wifite2"

# bettercap: prefer apt, fall back to go install
TOOL_BETTERCAP_APT="bettercap"
TOOL_BETTERCAP_GO="github.com/bettercap/bettercap@latest"

# ─── PYTHON PACKAGES (pip, in /opt/ghostlink/venv) ──────────────────────────

PIP_PACKAGES="flask flask-sock gunicorn gevent psutil scapy anthropic openai requests"

# ─── FRONTEND ASSETS (static download, pinned versions) ─────────────────────

XTERM_VERSION="5.3.0"
XTERM_JS_URL="https://cdn.jsdelivr.net/npm/xterm@${XTERM_VERSION}/lib/xterm.js"
XTERM_CSS_URL="https://cdn.jsdelivr.net/npm/xterm@${XTERM_VERSION}/css/xterm.css"
XTERM_ADDON_FIT_URL="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"

PICO_VERSION="2.0.6"
PICO_CSS_URL="https://cdn.jsdelivr.net/npm/@picocss/pico@${PICO_VERSION}/css/pico.min.css"

# ─── WORDLISTS ───────────────────────────────────────────────────────────────

WORDLIST_ROCKYOU_URL="https://github.com/brannondorsey/naive-hashcat/releases/download/data/rockyou.txt"
WORDLIST_DEST="/opt/ghostlink/wordlists"

# ─── INSTALL PATHS ──────────────────────────────────────────────────────────

GHOSTLINK_BASE="/opt/ghostlink"
GHOSTLINK_DRIVERS="${GHOSTLINK_BASE}/drivers"
GHOSTLINK_TOOLS="${GHOSTLINK_BASE}/tools"
GHOSTLINK_VENV="${GHOSTLINK_BASE}/venv"
GHOSTLINK_DASHBOARD="${GHOSTLINK_BASE}/dashboard"
GHOSTLINK_WORDLISTS="${GHOSTLINK_BASE}/wordlists"
GHOSTLINK_STATE="/var/lib/ghostlink"
GHOSTLINK_LOGS="/var/log/ghostlink"
GHOSTLINK_CONF="/etc/ghostlink"
