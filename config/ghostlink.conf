# Ghostlink Main Configuration
# Populated automatically by the install script

[system]
hostname=Ghostlink
timezone=UTC

[interfaces]
# rename_interfaces=false: keep OS-assigned names (wlan0/wlan1/...) — compatibility-first default.
# GhostLink resolves logical roles (mgmt/upstream/hotspot/aux) from /var/lib/ghostlink/interfaces.map.
# Set to true only if udev rules and systemd .link files are in place for gl-* names.
rename_interfaces=false
use_role_mapping=true

[zram]
# Raspberry Pi deployments only — skipped on generic Debian/Ubuntu/Kali
enabled=true
size_mb=2048
compression=zstd

[fan]
mode=medium-high
temp_off=50
temp_low=60
temp_mid=70
temp_high=80

[ssd]
scheduler=none
noatime=true
readahead_kb=8192
fstrim_schedule=weekly

[network]
mgmt_interface=gl-mgmt
upstream_interface=gl-upstream
hotspot_interface=gl-hotspot
# aux_interface: RTL8188EUS — auxiliary adapter, fallback hotspot when gl-hotspot unavailable
aux_interface=gl-aux

[aux]
# RTL8188EUS auxiliary/fallback adapter
# fallback_hotspot=true: use gl-aux as AP when gl-hotspot (RTL88x2BU) is unavailable
fallback_hotspot=false

[management]
# Management identity protection — keeps gl-mgmt MAC and hostname stable.
# Never spoof the management interface; never rename the machine on trusted networks.
hostname=Ghostlink
mdns_name=Ghostlink.local
protect_hostname=true
protect_gl_mgmt=true
# Comma-separated SSIDs that are trusted owner/management networks.
# Any interface connected to one of these SSIDs is protected from MAC/hostname spoofing.
trusted_ssids=Mainframe-16,Ghostlink-NET
# Comma-separated subnets that are trusted management networks (informational)
trusted_subnets=192.168.1.0/24
# Override flags — leave false unless you explicitly need to spoof management identity
allow_hostname_spoof=false
allow_mgmt_mac_spoof=false

[mgmt]
# mode: 'existing' (connect to your network) or 'custom' (use predefined SSID)
mode=existing
ssid=
password=

[hotspot]
ssid=Ghostlink-AP
password=ghostlink1234
channel=6
band=2.4GHz
hidden=false

[identity]
auto_rotate=false
rotate_interval_hours=24
default_profile=random
persist_across_reboot=true
# When true, skip rotation if connected to a trusted management SSID
stable_on_trusted_network=true
# When true, rotate on every connection to an untrusted network (requires auto_rotate=true)
randomize_on_untrusted_network=true

[dashboard]
port=8080
https=true
bind_interface=gl-mgmt

[llm]
# provider: claude | openai | groq | ollama
provider=claude
api_key=
model=claude-sonnet-4-6
# ollama_host=http://localhost:11434  (only for ollama)
enabled=false

[pentest]
monitor_interface=gl-upstream
log_dir=/var/log/ghostlink
report_dir=/var/log/ghostlink/reports
wordlist=/opt/ghostlink/wordlists/rockyou.txt
