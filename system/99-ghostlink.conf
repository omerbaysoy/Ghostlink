# Ghostlink kernel parameters

# Network forwarding (required for NAT)
net.ipv4.ip_forward=1

# Swap preference — use ZRAM first
vm.swappiness=60

# Reduce write-back latency (NVMe is fast)
vm.dirty_ratio=10
vm.dirty_background_ratio=5

# Increase file watch limit (for dashboard inotify)
fs.inotify.max_user_watches=524288

# Reduce conntrack table noise
net.netfilter.nf_conntrack_max=65536
